<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle { color: #666; margin-bottom: 30px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .tab {
            padding: 10px 25px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .tab.active { background: #667eea; color: white; }
        .tab:hover:not(.active) { background: #f0f0f0; }
        .panel { display: none; animation: fadeIn 0.3s; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        .drop-zone:hover, .drop-zone.dragover {
            background: #eef0ff;
            border-color: #764ba2;
        }
        .drop-zone-icon { font-size: 50px; color: #667eea; margin-bottom: 10px; }
        .file-input { display: none; }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .btn:hover { background: #764ba2; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-input:focus { outline: none; border-color: #667eea; }
        .result-card {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        .result-card:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .result-score {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .result-content { color: #333; line-height: 1.6; margin: 10px 0; }
        .result-meta { color: #666; font-size: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
        .result-meta span { background: #eef0ff; padding: 3px 10px; border-radius: 15px; }
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin: 15px 0;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; font-size: 14px; margin-top: 5px; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .file-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            margin: 15px 0;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
            border-radius: 3px;
        }
        .upload-progress { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 RAG Document Search</h1>
        <p class="subtitle">Intelligent Document Retrieval with AI</p>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('upload')">📤 Upload</button>
            <button class="tab" onclick="switchTab('search')">🔍 Search</button>
            <button class="tab" onclick="switchTab('stats')">📊 Stats</button>
        </div>

        <!-- Upload -->
        <div id="upload-panel" class="panel active">
            <h2>Upload Document</h2>
            <p style="color: #666; margin-bottom: 20px;">Supported: PDF, DOCX, DOC, TXT, Images (Max 10MB)</p>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="drop-zone-icon">📁</div>
                <p style="font-size: 18px; color: #333;"><strong>Drag & drop your document here</strong></p>
                <p style="color: #888;">or click to browse files</p>
            </div>
            <input type="file" id="fileInput" class="file-input" accept=".pdf,.docx,.doc,.txt,.png,.jpg,.jpeg" onchange="handleFileSelect(event)">
            <div id="fileInfo" style="display: none;">
                <div class="file-info">
                    <div><strong id="fileName"></strong> <span style="color: #888; margin-left: 10px;" id="fileSize"></span></div>
                    <button class="btn btn-secondary" onclick="clearFile()">Remove</button>
                </div>
                <button class="btn" onclick="uploadFile()" id="uploadBtn">Upload Document</button>
                <div class="upload-progress" id="uploadProgress">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
                    <p style="text-align: center; color: #666;" id="progressText">0%</p>
                </div>
            </div>
            <div id="uploadStatus"></div>
        </div>

        <!-- Search -->
        <div id="search-panel" class="panel">
            <h2>Search Documents</h2>
            <p style="color: #666; margin-bottom: 20px;">Ask questions about your documents</p>
            <div class="search-box">
                <input type="text" class="search-input" id="searchQuery" placeholder="Enter your search query..." onkeypress="if(event.key==='Enter') searchDocuments()">
                <button class="btn" onclick="searchDocuments()">🔍 Search</button>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="color: #666; font-size: 14px;">Results: </label>
                <select id="topK" style="padding: 8px 15px; border: 2px solid #ddd; border-radius: 8px; margin-left: 10px;">
                    <option value="3">3</option>
                    <option value="5" selected>5</option>
                    <option value="10">10</option>
                    <option value="20">20</option>
                </select>
            </div>
            <div id="searchResults"></div>
        </div>

        <!-- Stats -->
        <div id="stats-panel" class="panel">
            <h2>System Statistics</h2>
            <button class="btn" onclick="loadStats()" style="margin-bottom: 20px;">🔄 Refresh</button>
            <div id="statsContent"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let selectedFile = null;

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
            document.getElementById(`${tab}-panel`).classList.add('active');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileSize').textContent = `${(file.size / 1024).toFixed(2)} KB`;
                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('uploadStatus').innerHTML = '';
            }
        }

        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileSize').textContent = `${(file.size / 1024).toFixed(2)} KB`;
                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('uploadStatus').innerHTML = '';
            }
        });

        function clearFile() {
            selectedFile = null;
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('fileInput').value = '';
            document.getElementById('uploadStatus').innerHTML = '';
        }

        async function uploadFile() {
            if (!selectedFile) {
                showStatus('Please select a file first.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            document.getElementById('uploadProgress').style.display = 'block';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '0%';

            try {
                const response = await fetch(`${API_URL}/api/documents/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Upload failed');
                }

                const data = await response.json();
                showStatus(`✅ Successfully uploaded: ${data.filename}`, 'success');
                setTimeout(clearFile, 2000);
            } catch (error) {
                showStatus(`❌ Upload failed: ${error.message}`, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload Document';
                document.getElementById('uploadProgress').style.display = 'none';
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('uploadStatus');
            const className = type === 'error' ? 'alert-error' : type === 'success' ? 'alert-success' : 'alert-info';
            statusDiv.innerHTML = `<div class="alert ${className}">${message}</div>`;
        }

        async function searchDocuments() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) {
                document.getElementById('searchResults').innerHTML = '<div class="alert alert-info">Please enter a search query.</div>';
                return;
            }

            const topK = document.getElementById('topK').value;
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="loading"></div><p style="margin-top: 10px; color: #666;">Searching...</p></div>';

            try {
                const response = await fetch(`${API_URL}/api/search/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, top_k: parseInt(topK) })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Search failed');
                }

                const results = await response.json();

                if (results.length === 0) {
                    resultsDiv.innerHTML = '<div class="alert alert-info">No results found for your query.</div>';
                    return;
                }

                resultsDiv.innerHTML = results.map((r) => `
                    <div class="result-card">
                        <div class="result-score">${(r.score * 100).toFixed(1)}% match</div>
                        <div class="result-content">${escapeHtml(r.content)}</div>
                        <div class="result-meta">
                            <span>📄 Document #${r.document_id || 'N/A'}</span>
                            <span>📌 Chunk #${r.chunk_id || 'N/A'}</span>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                resultsDiv.innerHTML = `<div class="alert alert-error">❌ Search failed: ${error.message}</div>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadStats() {
            const statsDiv = document.getElementById('statsContent');
            statsDiv.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="loading"></div><p style="margin-top: 10px; color: #666;">Loading stats...</p></div>';

            try {
                const response = await fetch(`${API_URL}/api/documents/stats`);
                if (!response.ok) throw new Error('Failed to load stats');
                const stats = await response.json();

                statsDiv.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${stats.total_chunks || 0}</div>
                            <div class="stat-label">Total Chunks</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${stats.embedding_model ? stats.embedding_model.split('/').pop() : 'N/A'}</div>
                            <div class="stat-label">Embedding Model</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${stats.collection_name || 'N/A'}</div>
                            <div class="stat-label">Collection</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                statsDiv.innerHTML = `<div class="alert alert-error">❌ Failed to load stats: ${error.message}</div>`;
            }
        }

        // Load stats on page load
        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
